  <text x="1048" y="262" fill="#F8F8F3" font-family="Georgia,serif" font-size="18" text-anchor="end">Lower</text>
  <text x="872" y="290" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="18">Structure</text>
