  <text x="872" y="318" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="18">Handoff</text>
  <text x="1048" y="318" fill="#F8F8F3" font-family="Georgia,serif" font-size="18" text-anchor="end">Safer</text>
