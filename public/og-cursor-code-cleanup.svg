  <text x="233" y="98" text-anchor="middle" fill="#B8F0DA" font-family="Arial,sans-serif" font-size="16" letter-spacing="3">CURSOR CODE CLEANUP</text>
  <text x="68" y="190" fill="#F8F8F3" font-family="Georgia,serif" font-size="64">Clean up AI-generated code</text>
  <text x="68" y="258" fill="#F8F8F3" font-family="Georgia,serif" font-size="64">before it turns velocity into</text>
  <text x="68" y="326" fill="#F8F8F3" font-family="Georgia,serif" font-size="64">long-term drag.</text>
  <text x="68" y="400" fill="#B4B4BC" font-family="Arial,sans-serif" font-size="28">Refactor generated code, reduce duplication, improve structure, and make</text>
  <text x="68" y="438" fill="#B4B4BC" font-family="Arial,sans-serif" font-size="28">the codebase safer to extend under production pressure.</text>
