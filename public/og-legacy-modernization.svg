  <rect x="68" y="72" width="320" height="42" rx="21" fill="rgba(255,255,255,.04)" stroke="rgba(140,227,193,.24)"/>
  <text x="228" y="98" text-anchor="middle" fill="#B8F0DA" font-family="Arial,sans-serif" font-size="16" letter-spacing="3">LEGACY MODERNIZATION</text>
  <text x="68" y="190" fill="#F8F8F3" font-family="Georgia,serif" font-size="62">Modernize fragile internal tools</text>
  <text x="68" y="258" fill="#F8F8F3" font-family="Georgia,serif" font-size="62">and aging web apps without a</text>
  <text x="68" y="326" fill="#F8F8F3" font-family="Georgia,serif" font-size="62">reckless rewrite.</text>
  <text x="68" y="400" fill="#B4B4BC" font-family="Arial,sans-serif" font-size="28">Technical audits, controlled refactoring, production hardening, and</text>
  <text x="68" y="438" fill="#B4B4BC" font-family="Arial,sans-serif" font-size="28">modernization plans for brittle operational systems.</text>
  <rect x="818" y="58" width="286" height="286" rx="28" fill="rgba(255,255,255,.02)" stroke="rgba(140,227,193,.22)"/>
  <rect x="850" y="194" width="222" height="118" rx="18" fill="#101916" stroke="rgba(140,227,193,.18)"/>
  <text x="872" y="230" fill="#9CA3AF" font-family="Arial,sans-serif" font-size="14" letter-spacing="2">DELIVERY MAP</text>
  <text x="872" y="262" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="18">Operational risk</text>
  <text x="1048" y="262" fill="#F8F8F3" font-family="Georgia,serif" font-size="18" text-anchor="end">Lower</text>
  <text x="872" y="290" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="18">Refactor path</text>
  <text x="1048" y="290" fill="#F8F8F3" font-family="Georgia,serif" font-size="18" text-anchor="end">Controlled</text>
  <text x="872" y="318" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="18">Manual work</text>
  <text x="1048" y="318" fill="#F8F8F3" font-family="Georgia,serif" font-size="18" text-anchor="end">Reduced</text>
  <line x1="68" y1="538" x2="132" y2="538" stroke="#8CE3C1"/>
  <text x="154" y="545" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="20">Internal tools</text>
  <text x="304" y="545" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="20">Controlled refactor</text>
  <text x="524" y="545" fill="#D4D4D8" font-family="Arial,sans-serif" font-size="20">Production hardening</text>
